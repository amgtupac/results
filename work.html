<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work — Hills X Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;--fg:#e8e4d9;--muted:#6a6a7e;--accent:#c8ff47;
  --card-bg:rgba(10,10,15,0.58);--card-border:rgba(200,255,71,0.16);
  --hairline:0.0625rem;--ui:2rem;
  --fd:'Bebas Neue',sans-serif;--fs:'Cormorant Garamond',serif;--fm:'DM Mono',monospace;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--fg);font-family:var(--fm);overflow-x:hidden;min-height:100vh;}

#webgl-canvas{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;z-index:0;pointer-events:none;}

body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.03;pointer-events:none;z-index:9998;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.5rem var(--ui);border-bottom:var(--hairline) solid rgba(200,255,71,.07);backdrop-filter:blur(18px);background:rgba(10,10,15,.25);}
.logo{font-family:var(--fd);font-size:1.4rem;letter-spacing:.08em;color:var(--fg);text-decoration:none;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--accent);}
.nav-status{display:flex;align-items:center;gap:.5rem;font-size:.58rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}
.dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

#content{position:relative;z-index:1;padding-top:5rem;}

.band{padding:5rem var(--ui);background:rgba(10,10,15,.7);backdrop-filter:blur(2px);border-top:var(--hairline) solid rgba(200,255,71,.07);}

.sh{display:flex;align-items:baseline;gap:1.5rem;margin-bottom:3.5rem;padding-bottom:1rem;border-bottom:var(--hairline) solid rgba(200,255,71,.1);}
.sn{font-size:.58rem;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;}
.st{font-family:var(--fd);font-size:clamp(2rem,5vw,3.5rem);letter-spacing:.04em;line-height:1;}
.sr{flex:1;height:var(--hairline);background:rgba(200,255,71,.08);}

/* ── CAROUSEL ── */
.carousel-wrapper{position:relative;overflow:hidden;margin:0 calc(-1 * var(--ui));padding:1rem 0 2.5rem;}
.carousel-wrapper::before,.carousel-wrapper::after{content:'';position:absolute;top:0;bottom:2.5rem;width:140px;z-index:10;pointer-events:none;}
.carousel-wrapper::before{left:0;background:linear-gradient(to right,rgba(10,10,15,.92),transparent);}
.carousel-wrapper::after{right:0;background:linear-gradient(to left,rgba(10,10,15,.92),transparent);}

.carousel-track{display:flex;gap:1.5rem;width:max-content;padding:0 var(--ui);will-change:transform;cursor:grab;user-select:none;}
.carousel-track.dragging{cursor:grabbing;}

.carousel-arrows{display:flex;gap:.75rem;justify-content:center;margin-top:1.5rem;}
.c-arrow{width:2.5rem;height:2.5rem;border:var(--hairline) solid rgba(200,255,71,.22);background:transparent;color:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s,transform .15s;border-radius:50%;flex-shrink:0;}
.c-arrow:hover{background:var(--accent);border-color:var(--accent);color:var(--bg);}
.c-arrow:active{transform:scale(.9);}
.c-arrow svg{width:.7rem;height:.7rem;pointer-events:none;}

/* ── PROJECT CARD ── */
.proj-card{position:relative;width:320px;flex-shrink:0;background:var(--card-bg);border:var(--hairline) solid rgba(255,255,255,.06);overflow:hidden;cursor:pointer;transition:border-color .3s, transform .3s, box-shadow .3s;text-decoration:none;color:inherit;display:block;border-radius:2px;}
.proj-card:hover{border-color:rgba(200,255,71,.4);transform:translateY(-6px);box-shadow:0 24px 48px rgba(0,0,0,.5), 0 0 0 var(--hairline) rgba(200,255,71,.12);}

.proj-preview{position:relative;width:100%;height:200px;overflow:hidden;background:#0c0c14;}
.proj-preview iframe{width:160%;height:160%;border:none;transform:scale(0.625);transform-origin:top left;pointer-events:none;display:block;opacity:0;transition:opacity .5s ease;}
.proj-preview iframe.loaded{opacity:1;}

.proj-fallback{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;background:linear-gradient(135deg,#0c0c13 0%,#181821 50%,#0c0c13 100%);pointer-events:none;transition:opacity .4s ease;}
.proj-fallback::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(200,255,71,.025) 8px,rgba(200,255,71,.025) 9px);}
.proj-fallback-label{font-family:var(--fd);font-size:1.6rem;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;z-index:1;}
.proj-fallback-url{font-size:.5rem;letter-spacing:.12em;color:var(--muted);z-index:1;text-transform:uppercase;}
.proj-preview iframe.loaded ~ .proj-fallback{opacity:0;}

.proj-hover-overlay{position:absolute;inset:0;background:rgba(10,10,15,.75);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;opacity:0;transition:opacity .3s ease;pointer-events:none;}
.proj-card:hover .proj-hover-overlay{opacity:1;}
.proj-visit-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.4rem;font-family:var(--fm);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;border:var(--hairline) solid var(--accent);color:var(--accent);background:transparent;transition:background .2s,color .2s;}
.proj-card:hover .proj-visit-btn{background:var(--accent);color:var(--bg);}

.proj-info{padding:1.1rem 1.4rem 1.4rem;}
.proj-tag{font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.35rem;}
.proj-name{font-family:var(--fd);font-size:1.25rem;letter-spacing:.04em;line-height:1;margin-bottom:.45rem;transition:color .2s;}
.proj-card:hover .proj-name{color:var(--accent);}
.proj-desc{font-family:var(--fs);font-style:italic;font-size:.78rem;line-height:1.6;color:rgba(232,228,217,.42);}
.proj-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.9rem;padding-top:.65rem;border-top:var(--hairline) solid rgba(255,255,255,.06);}
.proj-year{font-size:.52rem;letter-spacing:.15em;color:var(--muted);}
.proj-arrow-ico{width:1.4rem;height:1.4rem;border:var(--hairline) solid rgba(200,255,71,.22);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;}
.proj-card:hover .proj-arrow-ico{background:var(--accent);border-color:var(--accent);}
.proj-arrow-ico svg{width:.45rem;height:.45rem;color:var(--accent);transition:color .2s;}
.proj-card:hover .proj-arrow-ico svg{color:var(--bg);}

.r{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease;}
.r.v{opacity:1;transform:none;}

footer{padding:2rem var(--ui);border-top:var(--hairline) solid rgba(255,255,255,.05);background:rgba(10,10,15,.85);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
.fl{font-family:var(--fd);font-size:1rem;letter-spacing:.08em;color:rgba(232,228,217,.25);}
.fl span{color:rgba(200,255,71,.35);}
.fc{font-size:.55rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}

@media(max-width:900px){
  nav{padding:1.25rem;}
  .nav-links{gap:1.5rem;}
  .band{padding:3rem 1.25rem;}
  footer{flex-direction:column;gap:1rem;text-align:center;}
  .proj-card{width:260px;}
  .proj-preview{height:160px;}
}
@media(max-width:600px){
  .nav-links{display:none;}
}
</style>
</head>

<script>
const canvas=document.getElementById("webgl-canvas");
const gl=canvas.getContext("webgl",{alpha:false,antialias:false,depth:false,stencil:false,preserveDrawingBuffer:false,powerPreference:"high-performance"});
if(!gl){canvas.style.background="#0a0a0f";}
if(gl){
const vs=`attribute vec2 a;void main(){gl_Position=vec4(a,0.0,1.0);}`;
const fs=`precision highp float;
uniform vec2 uR;uniform float uT,uS,uSc,uBl;uniform vec3 uBg;
#define PI 3.14159265359
#define MARCH_STEPS 24
#define REFINE_STEPS 6
vec3 sCol(vec3 c0,vec3 c1,vec3 c2,vec3 c3,vec3 c4){int si=int(uSc);vec3 a=c0,b=c1;if(si==1){a=c1;b=c2;}else if(si==2){a=c2;b=c3;}else if(si==3){a=c3;b=c4;}return mix(a,b,uBl);}
float sF(float c0,float c1,float c2,float c3,float c4){int si=int(uSc);float a=c0,b=c1;if(si==1){a=c1;b=c2;}else if(si==2){a=c2;b=c3;}else if(si==3){a=c3;b=c4;}return mix(a,b,uBl);}
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
float waveH(vec2 p,float t,float amp){float h=0.0;vec2 sd=normalize(vec2(1.0,0.35));float d=dot(p,sd);h+=amp*0.28*sin(d*0.80+t*0.60);h+=amp*0.40*sin(p.x*0.70+t*0.55+p.y*0.28);h+=amp*0.24*sin(p.x*1.60-t*0.82+p.y*0.72);h+=amp*0.16*sin(p.x*3.10+t*1.15-p.y*0.50);h+=amp*0.10*sin(p.x*5.50-t*1.70+p.y*1.30);h+=amp*0.05*sin(p.x*8.60+t*2.20+p.y*1.95);h+=noise(p*18.0+vec2(t*0.35,t*0.12))*0.010*amp;return h;}
vec3 waveNorm(vec2 p,float t,float amp){float e=0.014;float hL=waveH(p-vec2(e,0),t,amp),hR=waveH(p+vec2(e,0),t,amp),hD=waveH(p-vec2(0,e),t,amp),hU=waveH(p+vec2(0,e),t,amp);return normalize(vec3(-(hR-hL)/(2.0*e),1.0,-(hU-hD)/(2.0*e)));}
void main(){
vec2 uv=(gl_FragCoord.xy-uR*0.5)/uR.y;
vec3 ro=vec3(sin(uT*0.07)*0.02,1.1+sin(uT*0.11)*0.01,0.0);
vec3 rd=normalize(vec3(uv.x,uv.y-0.10,-1.4));
vec3 skyTop=sCol(vec3(0.18,0.06,0.24),vec3(0.05,0.24,0.68),vec3(0.26,0.06,0.04),vec3(0.01,0.01,0.05),vec3(0.04,0.05,0.09));
vec3 skyHori=sCol(vec3(0.92,0.48,0.18),vec3(0.42,0.62,0.90),vec3(0.88,0.32,0.04),vec3(0.03,0.05,0.14),vec3(0.15,0.17,0.23));
vec3 sunCol=sCol(vec3(1.0,0.62,0.22),vec3(1.0,0.96,0.80),vec3(1.0,0.38,0.05),vec3(0.70,0.75,0.94),vec3(0.26,0.28,0.34));
vec3 seaDeep=sCol(vec3(0.08,0.05,0.12),vec3(0.03,0.14,0.34),vec3(0.10,0.06,0.04),vec3(0.00,0.01,0.03),vec3(0.03,0.04,0.07));
vec3 seaShlo=sCol(vec3(0.28,0.17,0.24),vec3(0.09,0.38,0.60),vec3(0.24,0.13,0.06),vec3(0.04,0.06,0.16),vec3(0.07,0.10,0.14));
vec3 fogCol=sCol(vec3(0.80,0.50,0.30),vec3(0.58,0.72,0.90),vec3(0.70,0.28,0.05),vec3(0.02,0.03,0.08),vec3(0.12,0.14,0.18));
float sunProgress=clamp(uS/0.58,0.0,1.0);float sunAngle=sunProgress*PI;
float sunArcX=cos(sunAngle)*-0.75,sunArcY=sin(sunAngle)*0.38-0.08;
vec3 sunDir=normalize(vec3(sunArcX,sunArcY,-1.0));
vec3 moonDir=normalize(vec3(-0.14,0.42,-1.0));
float warm=smoothstep(0.22,-0.08,sunDir.y);sunCol=mix(sunCol,vec3(1.0,0.55,0.25),warm*0.35);
float waveAmp=sF(0.08,0.07,0.10,0.05,0.34),fogDen=sF(0.018,0.010,0.020,0.032,0.048),moonAmt=sF(0.0,0.0,0.05,0.92,0.06);
float sunAbove=step(0.0,sunDir.y),sunGlow=smoothstep(-0.10,0.06,sunDir.y);
vec3 col;
if(rd.y<0.0){
float tFlat=ro.y/(-rd.y),baseStep=tFlat/float(MARCH_STEPS),t=baseStep;
for(int i=0;i<MARCH_STEPS;i++){vec2 wp2=ro.xz+rd.xz*t;if(ro.y+rd.y*t<waveH(wp2,uT,waveAmp))break;t+=baseStep;}
float ta=t-baseStep,tb=t;
for(int i=0;i<REFINE_STEPS;i++){float tm=(ta+tb)*0.5;vec2 wpm=ro.xz+rd.xz*tm;if(ro.y+rd.y*tm<waveH(wpm,uT,waveAmp))tb=tm;else ta=tm;}
t=(ta+tb)*0.5;
vec2 wp=ro.xz+rd.xz*t;vec3 n=waveNorm(wp,uT,waveAmp),vDir=-rd;
float fres=pow(1.0-clamp(dot(n,vDir),0.0,1.0),4.0);
vec3 refl=reflect(rd,n);float rh=clamp(refl.y,0.0,1.0);
vec3 reflSky=mix(skyHori,skyTop,pow(rh,0.42));reflSky=mix(reflSky,skyHori,0.12);
float rSun=max(dot(refl,sunDir),0.0);
reflSky+=sunCol*pow(rSun,128.0)*2.2*sunGlow+sunCol*pow(rSun,18.0)*0.08*sunGlow;
if(moonAmt>0.04){float rMoon=max(dot(refl,moonDir),0.0);reflSky+=vec3(0.72,0.80,0.95)*pow(rMoon,128.0)*0.8*moonAmt;}
float depth=exp(-t*0.40);vec3 waterC=mix(seaDeep,seaShlo,depth*0.5);
waterC*=mix(vec3(1.0),vec3(0.78,0.90,1.0),clamp(t*0.35,0.0,1.0));
waterC+=noise(wp*1.9+vec2(uT*0.24,uT*0.08))*0.018*smoothstep(0.75,1.0,uS);
col=mix(waterC,reflSky,0.15+fres*0.35);
col+=sunCol*pow(max(dot(reflect(-sunDir,n),vDir),0.0),220.0)*1.25*sunAbove;
col+=sunCol*pow(max(dot(reflect(-sunDir,n),vDir),0.0),36.0)*0.14*sunGlow;
col+=sunCol*pow(max(dot(reflect(rd,n),sunDir),0.0),10.0)*0.32*smoothstep(0.0,0.35,-rd.y)*sunGlow;
float sparkle=noise(wp*24.0+vec2(uT*0.8,uT*0.35));col+=sunCol*smoothstep(0.92,1.0,sparkle)*0.12*sunGlow*sunAbove;
if(moonAmt>0.04){col+=vec3(0.72,0.80,0.95)*pow(max(dot(reflect(-moonDir,n),vDir),0.0),600.0)*0.11*moonAmt;}
float hC=waveH(wp,uT,waveAmp),hL2=waveH(wp-vec2(0.02,0),uT,waveAmp),hR2=waveH(wp+vec2(0.02,0),uT,waveAmp),hD2=waveH(wp-vec2(0,0.02),uT,waveAmp),hU2=waveH(wp+vec2(0,0.02),uT,waveAmp);
col+=clamp((hR2+hL2+hU2+hD2-4.0*hC)*28.0,0.0,1.0)*0.10*smoothstep(0.70,1.0,uS);
col=mix(col,fogCol,1.0-exp(-t*fogDen));
}else{col=mix(skyHori,skyTop,pow(clamp(rd.y,0.0,1.0),0.38));}
float skyMix=smoothstep(-0.008,0.008,rd.y);
vec3 sc=mix(skyHori,skyTop,pow(clamp(rd.y,0.0,1.0),0.38));
float sd2=max(dot(rd,sunDir),0.0);
sc+=sunCol*(pow(sd2,420.0)*7.2+pow(sd2,24.0)*0.22+pow(sd2,5.0)*0.10)*sunGlow;
sc+=sunCol*smoothstep(0.9992,0.99995,dot(rd,sunDir))*2.8*sunGlow;
sc+=sunCol*(pow(max(dot(rd,sunDir),0.0),2.0)*0.04+exp(-abs(rd.y)*24.0)*0.12+pow(max(dot(rd,sunDir),0.0),3.0)*0.04)*sunGlow;
if(moonAmt>0.04){float md=max(dot(rd,moonDir),0.0);sc+=vec3(0.88,0.92,1.0)*(pow(md,900.0)*8.0+pow(md,6.0)*0.05)*moonAmt;}
sc+=fogCol*exp(-abs(rd.y)*40.0)*0.08;
float hf=exp(-abs(rd.y)*18.0),lum=dot(sc,vec3(0.333));sc=mix(sc,vec3(lum),hf*0.12);
col=mix(col,sc,skyMix);
col=mix(fogCol,col,smoothstep(-0.008,0.018,rd.y)*0.25+0.75);
vec2 uvV=(gl_FragCoord.xy-uR*0.5)/uR.y;col=mix(uBg,col,smoothstep(1.15,0.35,length(uvV)));
col+=(hash(gl_FragCoord.xy+uT*60.0)-0.5)*0.004;
gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);}`;

const mkS=(t,s)=>{const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(sh));return null;}return sh;};
const vert=mkS(gl.VERTEX_SHADER,vs),frag=mkS(gl.FRAGMENT_SHADER,fs);
const prog=gl.createProgram();gl.attachShader(prog,vert);gl.attachShader(prog,frag);gl.linkProgram(prog);gl.useProgram(prog);
gl.disable(gl.DEPTH_TEST);gl.disable(gl.CULL_FACE);gl.disable(gl.BLEND);gl.disable(gl.DITHER);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const ap=gl.getAttribLocation(prog,"a");gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);
const uR=gl.getUniformLocation(prog,"uR"),uTi=gl.getUniformLocation(prog,"uT"),uSc2=gl.getUniformLocation(prog,"uS"),uSc3=gl.getUniformLocation(prog,"uSc"),uBl=gl.getUniformLocation(prog,"uBl"),uBgU=gl.getUniformLocation(prog,"uBg");
const hv=(h)=>{const n=parseInt(h.replace("#",""),16);return[((n>>16)&255)/255,((n>>8)&255)/255,(n&255)/255];};
gl.uniform3f(uBgU,...hv("#0a0a0f"));
const N=5;let maxScroll=1,tgt=0,smooth=0,velocity=0,qS=1.0,rAF=0;

<!-- Carousel & Projects -->
<script>
(function initCarousel() {
  const wrapper = document.getElementById('carousel-wrapper');
  const track   = document.getElementById('carousel-track');
  const btnPrev = document.getElementById('c-prev');
  const btnNext = document.getElementById('c-next');

  const AUTO_SPEED  = 0.45;
  const CARD_STEP   = 336;
  const FRICTION    = 0.92;
  const RESUME_MS   = 1200;

  let x          = 0;
  let halfW      = 0;
  let autoActive = true;
  let resumeTimer= null;

  let dragging   = false;
  let dragStartX = 0;
  let dragLastX  = 0;
  let velocity   = 0;
  let lastMoveT  = 0;

  function measure() { halfW = track.scrollWidth / 2; }

  function clamp(val) {
    if (halfW <= 0) return val;
    val = val % halfW;
    if (val > 0) val -= halfW;
    return val;
  }

  function scheduleResume() {
    autoActive = false;
    clearTimeout(resumeTimer);
    resumeTimer = setTimeout(() => { autoActive = true; }, RESUME_MS);
  }

  function tick() {
    if (!dragging) {
      if (Math.abs(velocity) > 0.1) {
        x += velocity;
        velocity *= FRICTION;
      } else {
        velocity = 0;
        if (autoActive) x -= AUTO_SPEED;
      }
      x = clamp(x);
    }
    track.style.transform = 'translateX(' + x + 'px)';
    requestAnimationFrame(tick);
  }

  btnPrev.addEventListener('click', () => {
    velocity = 0;
    x = clamp(x + CARD_STEP);
    scheduleResume();
  });
  btnNext.addEventListener('click', () => {
    velocity = 0;
    x = clamp(x - CARD_STEP);
    scheduleResume();
  });

  track.addEventListener('mousedown', e => {
    dragging   = true;
    dragStartX = e.clientX;
    dragLastX  = e.clientX;
    velocity   = 0;
    lastMoveT  = performance.now();
    track.classList.add('dragging');
    scheduleResume();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - dragLastX;
    velocity = dx * 0.6 + velocity * 0.4;
    x = clamp(x + dx);
    dragLastX = e.clientX;
    lastMoveT = performance.now();
  });

  window.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    track.classList.remove('dragging');
    const totalDrag = e.clientX - dragStartX;
    if (Math.abs(totalDrag) < 5) velocity = 0;
    scheduleResume();
  });

  let touchStartX = 0;
  track.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    dragLastX   = touchStartX;
    velocity    = 0;
    dragging    = true;
    scheduleResume();
  }, { passive: true });

  track.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - dragLastX;
    velocity  = dx * 0.6 + velocity * 0.4;
    x = clamp(x + dx);
    dragLastX = e.touches[0].clientX;
  }, { passive: true });

  track.addEventListener('touchend', () => {
    dragging = false;
    scheduleResume();
  });

  track.addEventListener('click', e => {
    if (Math.abs(dragLastX - dragStartX) > 5) e.preventDefault();
  }, true);

  window.addEventListener('resize', measure, { passive: true });

  window._startCarousel = function () {
    requestAnimationFrame(() => {
      measure();
      tick();
    });
  };
})();

const iframeObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const iframe = entry.target;
      const src = iframe.dataset.src;
      if (src && !iframe.src) {
        iframe.src = src;
        iframe.addEventListener('load', () => { iframe.classList.add('loaded'); });
      }
      iframeObserver.unobserve(iframe);
    }
  });
}, { rootMargin: '200px' });

document.querySelectorAll('.proj-preview iframe').forEach(iframe => {
  iframeObserver.observe(iframe);
});

// Reveal on scroll
const io = new IntersectionObserver(e => {
  e.forEach(x => {
    if (x.isIntersecting) { x.target.classList.add('v'); io.unobserve(x.target); }
  });
}, { threshold: .1, rootMargin: '0px 0px -6% 0px' });
document.querySelectorAll('.r').forEach(el => io.observe(el));
